<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blast from the past 80's style</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
  <div class="max-w-md mx-auto bg-white shadow-md rounded-lg p-6">
    <h1 class="text-2xl font-bold mb-4">Generation X Music</h1>
    
    <div id="chat-box" class="h-64 overflow-y-auto mb-4 p-2 border border-gray-200 rounded text-sm">
      <p class="text-gray-500">Name the artist</p>
    </div>

    <div class="flex gap-2">
      <input type="text" id="user-input" placeholder="e.g.  80s Music" 
             class="flex-1 border p-2 rounded focus:outline-blue-500">
      <button id="send-btn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Send</button>
    </div>
    
    <p id="error-msg" class="text-red-500 text-xs mt-2 hidden"></p>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const errorMsg = document.getElementById('error-msg');
    const createMessageEl = (text, isUser) => {
      const div = document.createElement('div');
      div.className = isUser ? 'text-right mb-2' : 'text-left mb-2';
      const span = document.createElement('span');
      span.textContent = text;
      span.className = isUser ? 'bg-blue-100 p-2 rounded inline-block' : 'bg-gray-100 p-2 rounded inline-block';
      div.appendChild(span);
      return div;
    };
    async function getMusicAdvice(prompt) {
      try {
        errorMsg.classList.add('hidden'); 
        const response = await fetch( {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `Suggest 3 songs for this mood: ${prompt}` })
        });

        if (!response.ok) throw new Error("The AI is currently off-stage.");

        const data = await response.json();
        return data.reply; 
      } catch (err) {
        errorMsg.textContent = `Error: ${err.message}`;
        errorMsg.classList.remove('hidden');
        return null;
      }
    }
    sendBtn.addEventListener('click', async () => {
      const text = userInput.value.trim();
      if (!text) return;
      chatBox.appendChild(createMessageEl(text, true));
      userInput.value = '';
      const aiResponse = await getMusicAdvice(text);
      if (aiResponse) {
        chatBox.appendChild(createMessageEl(aiResponse, false));
      }
      
      chatBox.scrollTop = chatBox.scrollHeight;
    });
  </script>
</body>
</html>
